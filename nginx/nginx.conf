# ═══════════════════════════════════════════════════════════════
# CodEdu — Nginx Reverse Proxy & Load Balancer
# ═══════════════════════════════════════════════════════════════
# Features:
#   - TLS/HTTPS termination (self-signed for dev, real certs for prod)
#   - WebSocket upgrade handling
#   - Round-robin load balancing across 3 backend instances
#   - Rate limiting (10 req/s API, 2 req/s WebSocket upgrade)
#   - Security headers (CSP, HSTS, X-Frame-Options, etc.)
#   - Static file caching
#   - Gzip compression

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ─── Basic Settings ───────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Hide Nginx version for security
    server_tokens off;

    # ─── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Rate Limiting ────────────────────────────────────────
    # Zone for general API requests: 10 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Zone for WebSocket upgrade requests: 2 req/sec per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=2r/s;

    # ─── Upstream: Round-Robin Load Balancing ─────────────────
    upstream codedu_backends {
        # Round-robin (default) across 3 instances
        server codedu-1:8080 max_fails=3 fail_timeout=30s;
        server codedu-2:8080 max_fails=3 fail_timeout=30s;
        server codedu-3:8080 max_fails=3 fail_timeout=30s;

        # Keep connections alive to backends
        keepalive 32;
    }

    # ─── HTTP → HTTPS Redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check on HTTP (for Docker/k8s)
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ─────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS Configuration ────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # Modern TLS settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ─────────────────────────────────
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: ws:; img-src 'self' data:;" always;

        # ── Request Size Limit ────────────────────────────────
        client_max_body_size 10M;

        # ── Health Check ──────────────────────────────────────
        location /health {
            proxy_pass http://codedu_backends/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── WebSocket Endpoint ────────────────────────────────
        location /ws {
            limit_req zone=ws_limit burst=5 nodelay;

            proxy_pass http://codedu_backends/ws;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Forward client info
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Disable buffering for real-time
            proxy_buffering off;
        }

        # ── API Routes ────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://codedu_backends;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Reasonable timeouts for API (code execution can take up to 7s)
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Static Assets (served by backend, cached by Nginx) ─
        location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
            proxy_pass http://codedu_backends;
            proxy_set_header Host $host;

            # Cache static assets aggressively
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── All other routes (HTML pages) ─────────────────────
        location / {
            proxy_pass http://codedu_backends;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # No cache for HTML
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
