# CodEdu — Nginx Reverse Proxy & Load Balancer
# Features:
#   - TLS/HTTPS termination (self-signed for dev, real certs for prod)
#   - WebSocket upgrade handling
#   - Rate limiting (10 req/s API, 2 req/s WebSocket upgrade)
#   - Security headers (CSP, HSTS, X-Frame-Options, etc.)
#   - Static file caching
#   - Gzip compression

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Hide Nginx version for security
    server_tokens off;

    upstream codedu_backend {
        server app:8080;

        keepalive 32;
    }

    # custom log format for the NGINX service
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # enables GZIP to on, compressing the defined types under gzip_types
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;


    # HTTP WebSocket Upgrade (currently not used temporarily)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # rate limiting from one IP source
    # general API requests: 10 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # for WebSocket (future implementation) upgrade requests: 2 req/sec per IP
    # limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=2r/s;

    # regular HTTP server
    server {
        listen 80;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # modern SSL settings for the NGINX
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # add security header, XSS, CSP
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: ws:; img-src 'self' data:;" always;

        # how much the client request size limit
        client_max_body_size 10M;

        # location /api/ {
        #     proxy_pass http://codedu_backend;
        #
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #
        #     proxy_http_version 1.1;
        #
        # }

        location / {
            proxy_pass http://codedu_backend;

            limit_req zone=api_limit burst=20 nodelay;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HTTP upgrade for future support on WS
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_http_version 1.1;

            # cache disabled for HTML
            add_header Cache-Control "no-cache, no-store, must-revalidate";


            # timeout set for 30 seconds, for API calling, code execution takes up max 30s
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            # upstream failover if we have multiple backends (now disabled)
            # proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
            proxy_pass http://codedu_backend;
            proxy_set_header Host $host;

            # Cache static assets aggressively
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~ /\. {
            deny all;
        }

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
