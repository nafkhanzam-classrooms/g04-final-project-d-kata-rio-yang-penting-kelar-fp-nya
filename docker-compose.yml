# ═══════════════════════════════════════════════════════════════
# CodEdu — Docker Compose Orchestration
# ═══════════════════════════════════════════════════════════════
# Runs 3 CodEdu backend instances + 1 Nginx load balancer
#
# Usage:
#   1. Generate TLS certs:  cd nginx && bash generate_certs.sh && cd ..
#   2. Build & start:       docker-compose up --build -d
#   3. View logs:           docker-compose logs -f
#   4. Stop:                docker-compose down

services:
  # ─── Backend Instance 1 ──────────────────────────────────────
  codedu-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedu-1
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - question-data:/app/data/questions:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CODEDU_INSTANCE=1
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - codedu-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8080)); s.send(b'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n'); d=s.recv(1024); s.close(); exit(0 if b'200' in d else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Backend Instance 2 ──────────────────────────────────────
  codedu-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedu-2
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - question-data:/app/data/questions:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CODEDU_INSTANCE=2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - codedu-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8080)); s.send(b'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n'); d=s.recv(1024); s.close(); exit(0 if b'200' in d else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Backend Instance 3 ──────────────────────────────────────
  codedu-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codedu-3
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - question-data:/app/data/questions:ro
    environment:
      - PYTHONUNBUFFERED=1
      - CODEDU_INSTANCE=3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - codedu-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',8080)); s.send(b'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n'); d=s.recv(1024); s.close(); exit(0 if b'200' in d else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Nginx Load Balancer + TLS Termination ──────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: codedu-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      codedu-1:
        condition: service_healthy
      codedu-2:
        condition: service_healthy
      codedu-3:
        condition: service_healthy
    networks:
      - codedu-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  question-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/questions

# ─── Networks ─────────────────────────────────────────────────
networks:
  codedu-net:
    driver: bridge
