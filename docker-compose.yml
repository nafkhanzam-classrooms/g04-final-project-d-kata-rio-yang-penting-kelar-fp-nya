services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: g04-app

    restart: unless-stopped

    expose:
      - "8080"

    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      - uploads-data:/app/public/uploads

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_PORT: ${APP_PORT}

    networks:
      - g04-net

  mysql:
    image: mysql:8.4

    container_name: g04-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql-data:/var/lib/mysql
      - ./app/config/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - g04-net

  nginx:
    image: nginx:1.27-alpine

    container_name: g04-nginx

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro

    depends_on:
      - app

    networks:
      - g04-net

volumes:
  mysql-data:
  uploads-data:

networks:
  g04-net:
    driver: bridge
